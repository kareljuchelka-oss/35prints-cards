<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Ing. Matěj Ohanka">
<meta name="theme-color" content="#F4F4F4">
<title>Ing. Matěj Ohanka — 35 prints</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  background: #F4F4F4;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 24px;
  overscroll-behavior: none;
}
.card {
  position: relative;
  width: 100%;
  max-width: 380px;
  aspect-ratio: 1.75 / 1;
  background: #F4F4F4;
  border-radius: 16px;
  overflow: hidden;
  box-shadow: 0 2px 40px rgba(26,26,26,0.13), 0 1px 4px rgba(26,26,26,0.07);
}
.bg-blur { position: absolute; inset: 0; overflow: hidden; }
.blur-shape { position: absolute; border-radius: 50%; filter: blur(42px); }
.blur-1 { width: 62%; height: 90%; background: #C65D3B; top: -22%; left: -16%; opacity: 0.75; }
.blur-2 { width: 38%; height: 58%; background: #C65D3B; top: 30%; left: 6%; opacity: 0.42; }
.blur-3 { width: 26%; height: 38%; background: #DA7A5C; top: -8%; left: 20%; opacity: 0.28; }
.card-content {
  position: absolute;
  inset: 0;
  display: grid;
  grid-template-columns: 1fr auto;
  align-items: end;
  padding: 20px 22px;
  gap: 16px;
}
.info { display: flex; flex-direction: column; }
.name {
  font-size: clamp(16px, 4.6vw, 21px);
  font-weight: 700;
  color: #1A1A1A;
  line-height: 1.08;
  letter-spacing: -0.3px;
  white-space: nowrap;
}
.role {
  font-size: clamp(10px, 2.6vw, 12.5px);
  font-weight: 400;
  color: #1A1A1A;
  opacity: 0.6;
  margin-top: 4px;
}
.contacts { display: flex; flex-direction: column; gap: 1px; margin-top: 10px; }
.contact-line {
  font-size: clamp(9px, 2.4vw, 11px);
  font-weight: 400;
  color: #1A1A1A;
  text-decoration: none;
  opacity: 0.82;
  display: block;
}
.qr-wrap { display: flex; flex-direction: column; align-items: flex-end; justify-content: flex-end; gap: 5px; }
.qr-box {
  background: #fff;
  border-radius: 5px;
  padding: 5px;
  width: clamp(88px, 25vw, 114px);
  height: clamp(88px, 25vw, 114px);
  display: flex;
  align-items: center;
  justify-content: center;
}
.qr-box svg { width: 100%; height: 100%; display: block; }
.logo-mark {
  font-size: clamp(8px, 2vw, 10px);
  font-weight: 700;
  color: #1A1A1A;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  opacity: 0.4;
  text-align: right;
}
.brand-footer {
  margin-top: 28px;
  font-size: 10px;
  letter-spacing: 1.4px;
  text-transform: uppercase;
  color: #1A1A1A;
  opacity: 0.2;
  font-weight: 600;
}
</style>
</head>
