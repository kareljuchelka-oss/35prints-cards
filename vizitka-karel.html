<title>Karel Juchelka — thirty-five</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
html, body {
  width: 100%; height: 100%;
  background: #F4F4F4;
  font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
  overscroll-behavior: none;
  overflow: hidden;
}
body {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}
.card {
  position: relative;
  width: 700px;
  height: 400px;
  background: #F4F4F4;
  border-radius: 24px;
  overflow: hidden;
  box-shadow: 0 4px 50px rgba(26,26,26,0.18), 0 1px 6px rgba(26,26,26,0.08);
  flex-shrink: 0;
  transform-origin: center center;
}
.bg-blur { position: absolute; inset: 0; overflow: hidden; }
.blur-shape { position: absolute; border-radius: 50%; filter: blur(70px); }
.blur-1 { width: 62%; height: 90%; background: #C65D3B; top: -22%; left: -16%; opacity: 0.75; }
.blur-2 { width: 38%; height: 58%; background: #C65D3B; top: 30%; left: 6%; opacity: 0.42; }
.blur-3 { width: 26%; height: 38%; background: #DA7A5C; top: -8%; left: 20%; opacity: 0.28; }

.qr-wrap {
  position: absolute;
  bottom: 35px;
  right: 40px;
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 8px;
}
.qr-box {
  background: #fff;
  border-radius: 6px;
  padding: 6px;
  width: 250px;
  height: 250px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qr-box svg { width: 100%; height: 100%; display: block; }
.logo-mark {
  font-size: 11px;
  font-weight: 700;
  color: #1A1A1A;
  letter-spacing: 2px;
  text-transform: uppercase;
  opacity: 0.4;
}

.info {
  position: absolute;
  bottom: 35px;
  left: 40px;
  display: flex;
  flex-direction: column;
}
.name {
  font-size: 43px;
  font-weight: 700;
  color: #1A1A1A;
  line-height: 1.05;
  letter-spacing: -0.5px;
  white-space: nowrap;
}
.role {
  font-size: 20px;
  font-weight: 400;
  color: #1A1A1A;
  opacity: 0.6;
  margin-top: 5px;
  white-space: nowrap;
}
.contacts {
  display: flex;
  flex-direction: column;
  gap: 2px;
  margin-top: 25px;
}
.contact-line {
  font-size: 18px;
  font-weight: 400;
  color: #1A1A1A;
  text-decoration: none;
  opacity: 0.82;
  display: block;
}
</style>
</head>

<script>
function scaleCard() {
  const card = document.getElementById('card');
  const vw = window.innerWidth;
  const vh = window.innerHeight;
  const padding = 40;
  const scaleByWidth = (vw - padding) / 400;
  const scaleByHeight = (vh - padding) / 700;
  const scale = Math.min(scaleByWidth, scaleByHeight);
  card.style.transform = `rotate(90deg) scale(${scale})`;
}
scaleCard();
window.addEventListener('resize', scaleCard);
</script>
